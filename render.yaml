services:
  - type: web
    name: interview-coach-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DISABLE_WHISPER
        value: "true"
      - key: DISABLE_COREML
        value: "true"
      - key: CORS_ORIGINS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /api/health
